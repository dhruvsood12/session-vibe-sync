# AttentionLens — local dev stack (optional)
# Run backend + frontend separately for dev; use this for a single-command preview later.

version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend:/app

